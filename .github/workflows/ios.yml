name: iOS Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build and test on macOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install iOS Simulator platform
        run: |
          for attempt in 1 2 3; do
            echo "Download attempt $attempt..."
            if xcodebuild -downloadPlatform iOS; then
              exit 0
            fi
            sleep 30
          done
          echo "Platform download failed after 3 attempts"
          exit 1

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project AeroLogUltimate.xcodeproj \
            -scheme AeroLogUltimate \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run unit tests
        run: |
          DESTINATION=$(python3 - <<'PY'
          import json, subprocess
          out = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"])
          data = json.loads(out)
          for runtime in sorted(data["devices"].keys(), reverse=True):
              if "iOS" not in runtime:
                  continue
              for device in data["devices"][runtime]:
                  if device.get("isAvailable") and "iPad" in device["name"]:
                      print(f"platform=iOS Simulator,id={device['udid']}")
                      raise SystemExit
          raise SystemExit("No available iPad simulator found")
          PY
          )
          echo "Using destination: $DESTINATION"
          xcodebuild \
            -project AeroLogUltimate.xcodeproj \
            -scheme AeroLogUltimate \
            -destination "$DESTINATION" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            test