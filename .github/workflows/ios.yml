name: iOS Build & Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build and test on macOS
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install iOS Simulator platform
        run: |
          for attempt in 1 2 3; do
            echo "Download attempt $attempt..."
            if xcodebuild -downloadPlatform iOS; then
              exit 0
            fi
            sleep 30
          done
          echo "Platform download failed after 3 attempts"
          exit 1

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -project AeroLogUltimate.xcodeproj \
            -scheme AeroLogUltimate \
            -sdk iphonesimulator \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Run unit tests
        run: |
          DESTINATION=$(python3 - <<'PY'
          import json, re, subprocess

          out = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"])
          data = json.loads(out)
          avoid = re.compile(r"M5|13-inch \(M5\)")

          for runtime in sorted(data["devices"].keys(), reverse=True):
              if "iOS" not in runtime:
                  continue
              for device in data["devices"][runtime]:
                  name = device["name"]
                  if device.get("isAvailable") and "iPad" in name and not avoid.search(name):
                      print(f"platform=iOS Simulator,id={device['udid']}")
                      raise SystemExit

          for runtime in sorted(data["devices"].keys(), reverse=True):
              if "iOS" not in runtime:
                  continue
              for device in data["devices"][runtime]:
                  if device.get("isAvailable") and "iPad" in device["name"]:
                      print(f"platform=iOS Simulator,id={device['udid']}")
                      raise SystemExit

          raise SystemExit("No available iPad simulator found")
          PY
          )
          echo "Using destination: $DESTINATION"
          UDID="${DESTINATION#*id=}"
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b

          for attempt in 1 2 3; do
            echo "Test attempt $attempt..."
            if xcodebuild \
              -project AeroLogUltimate.xcodeproj \
              -scheme AeroLogUltimate \
              -destination "$DESTINATION" \
              -configuration Debug \
              CODE_SIGNING_ALLOWED=NO \
              test; then
              exit 0
            fi
            xcrun simctl shutdown "$UDID" 2>/dev/null || true
            sleep 5
            xcrun simctl boot "$UDID" 2>/dev/null || true
            xcrun simctl bootstatus "$UDID" -b
          done
          echo "Tests failed after 3 attempts"
          exit 1

      - name: Build for iPhone companion layout
        run: |
          IPHONE_DEST=$(python3 - <<'PY'
          import json, subprocess
          out = subprocess.check_output(["xcrun", "simctl", "list", "devices", "available", "-j"])
          data = json.loads(out)
          for runtime in sorted(data["devices"].keys(), reverse=True):
              if "iOS" not in runtime:
                  continue
              for device in data["devices"][runtime]:
                  name = device["name"]
                  if device.get("isAvailable") and "iPhone" in name:
                      print(f"platform=iOS Simulator,id={device['udid']}")
                      raise SystemExit
          raise SystemExit("No available iPhone simulator found")
          PY
          )
          echo "Using iPhone destination: $IPHONE_DEST"
          xcodebuild \
            -project AeroLogUltimate.xcodeproj \
            -scheme AeroLogUltimate \
            -destination "$IPHONE_DEST" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build